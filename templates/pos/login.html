<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام الكاشير</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo i {
            font-size: 2.5rem;
            color: #2563eb;
        }
        .logo h2 {
            margin-top: 10px;
            font-size: 1.4rem;
            color: #1e293b;
        }
        .logo p { color: #64748b; font-size: 0.9rem; margin-top: 4px; }

        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: #374151; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            direction: ltr;
        }
        input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn-login {
            width: 100%;
            padding: 13px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-login:hover { background: #1d4ed8; }
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.88rem;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo">
        <i class="fas fa-cash-register"></i>
        <h2>نظام الكاشير</h2>
        <p>سجّل دخولك للمتابعة</p>
    </div>

    {% if form.errors %}
    <div class="error">
        <i class="fas fa-exclamation-circle"></i>
        اسم المستخدم أو كلمة السر غلط
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>اسم المستخدم</label>
            <input type="text" name="username" autofocus placeholder="username">
        </div>
        <div class="form-group">
            <label>كلمة السر</label>
            <input type="password" name="password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn-login">
            <i class="fas fa-sign-in-alt"></i>
            دخول
        </button>
    </form>
</div>
</body>
</html>
