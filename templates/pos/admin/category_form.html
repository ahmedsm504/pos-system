{% extends 'pos/admin/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_icon %}<i class="fas fa-tags"></i>{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div style="max-width:500px">
<div class="card">
  <form method="post">{% csrf_token %}
    <div class="fg"><label>اسم التصنيف *</label><input name="name" value="{{ obj.name|default:'' }}" required></div>
    <div class="fg"><label>النوع *</label>
      <select name="category_type">
        <option value="food" {% if obj.category_type == 'food' %}selected{% endif %}>أكل</option>
        <option value="drink" {% if obj.category_type == 'drink' %}selected{% endif %}>مشروبات</option>
        <option value="other" {% if obj.category_type == 'other' %}selected{% endif %}>أخرى</option>
      </select>
    </div>
    <div class="fg"><label>الترتيب</label><input name="order" type="number" value="{{ obj.order|default:0 }}"></div>
    {% if obj %}<div class="fg"><label style="display:flex;align-items:center;gap:8px"><input type="checkbox" name="is_active" {% if obj.is_active %}checked{% endif %}> نشط</label></div>{% endif %}
    <div style="display:flex;gap:10px;margin-top:20px">
      <a href="{% url 'admin_menu' %}" class="btn btn-out" style="flex:1;justify-content:center">إلغاء</a>
      <button type="submit" class="btn btn-pri" style="flex:2;justify-content:center"><i class="fas fa-save"></i> حفظ</button>
    </div>
  </form>
</div>
</div>
{% endblock %}
