{% extends 'pos/admin/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_icon %}<i class="fas fa-burger"></i>{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div style="max-width:520px">
<div class="card">
  <form method="post">{% csrf_token %}
    <div class="fg"><label>التصنيف *</label>
      <select name="category" required>
        <option value="">اختر تصنيف</option>
        {% for cat in categories %}<option value="{{ cat.pk }}" {% if obj.category_id == cat.pk %}selected{% endif %}>{{ cat.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="fg"><label>اسم المنتج *</label><input name="name" value="{{ obj.name|default:'' }}" required></div>
    <div class="fg-row">
      <div class="fg"><label>السعر *</label><input name="price" type="number" step="0.01" value="{{ obj.price|default:'' }}" required></div>
      <div class="fg"><label>الترتيب</label><input name="order" type="number" value="{{ obj.order|default:0 }}"></div>
    </div>
    <div class="fg"><label>الوصف</label><textarea name="description">{{ obj.description|default:'' }}</textarea></div>
    {% if obj %}<div class="fg"><label style="display:flex;align-items:center;gap:8px"><input type="checkbox" name="is_available" {% if obj.is_available %}checked{% endif %}> متاح للطلب</label></div>{% endif %}
    <div style="display:flex;gap:10px;margin-top:20px">
      <a href="{% url 'admin_menu' %}" class="btn btn-out" style="flex:1;justify-content:center">إلغاء</a>
      <button type="submit" class="btn btn-pri" style="flex:2;justify-content:center"><i class="fas fa-save"></i> حفظ</button>
    </div>
  </form>
</div>
</div>
{% endblock %}
